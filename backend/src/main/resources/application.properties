spring.application.name=crypto-dashboard

server.port=${PORT:8080}

# CoinGecko (values come from .env via DotEnv, loaded in main())
coingecko.api-key=${COINGECKO_API_KEY:}
coingecko.base-url=${COINGECKO_BASE_URL:https://api.coingecko.com/api/v3}

# App settings
app.allowed-origin=${ALLOWED_ORIGIN:http://localhost:5173}
app.cache-ttl-seconds=60
